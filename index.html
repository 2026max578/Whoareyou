<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>燼火 - 宇宙之門</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(ellipse at bottom, #0b001f 0%, #000000 100%);
      font-family: 'Microsoft JhengHei', 'Helvetica Neue', sans-serif;
      color: #e0d0ff;
    }

    /* 星空背景層 */
    #stars,
    #stars2,
    #stars3 {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      pointer-events: none;
    }

    #stars {
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="2" height="2"><circle cx="1" cy="1" r="1" fill="white"/></svg>') repeat;
      background-size: 2px 2px;
      opacity: 0.7;
      animation: drift 120s linear infinite;
    }

    #stars2 {
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="3" height="3"><circle cx="1.5" cy="1.5" r="1.2" fill="white"/></svg>') repeat;
      background-size: 3px 3px;
      opacity: 0.5;
      animation: drift 180s linear infinite reverse;
    }

    #stars3 {
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><circle cx="2" cy="2" r="1.5" fill="%23d0c0ff"/></svg>') repeat;
      background-size: 80px 80px;
      opacity: 0.3;
      animation: drift 300s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 1000px 1000px; }
    }

    /* 中央歡迎文字 */
    .welcome {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .welcome h1 {
      font-size: clamp(3.2rem, 12vw, 9rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      text-shadow: 0 0 40px rgba(180, 140, 255, 0.8),
                   0 0 80px rgba(120, 80, 220, 0.5);
      opacity: 0;
      animation: fadeInGlow 5s ease-out forwards 1s;
    }

    .welcome p {
      font-size: clamp(1.4rem, 5vw, 2.8rem);
      margin-top: 1.2rem;
      letter-spacing: 0.6em;
      opacity: 0;
      animation: fadeInGlow 6s ease-out forwards 2.5s;
    }

    @keyframes fadeInGlow {
      0%   { opacity: 0;   transform: translateY(40px); filter: blur(8px); }
      50%  { opacity: 0.3; filter: blur(4px); }
      100% { opacity: 1;   transform: translateY(0);   filter: blur(0); }
    }

    /* 輕微的紫色星雲感 */
    .nebula {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(120,80,220,0.12) 0%, transparent 40%),
                  radial-gradient(circle at 70% 30%, rgba(180,140,255,0.08) 0%, transparent 50%);
      pointer-events: none;
      animation: nebulaPulse 25s ease-in-out infinite alternate;
    }

    @keyframes nebulaPulse {
      0%   { opacity: 0.4; transform: scale(1); }
      100% { opacity: 0.7; transform: scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="nebula"></div>
  <div id="stars"></div>
  <div id="stars2"></div>
  <div id="stars3"></div>

  <div class="welcome">
    <h1>歡迎光臨</h1>
    <p>燼火</p>
  </div>

</body>
</html>
